services:
  - type: web
    name: health-care-agent
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_NAME
        value: HealthCare Production AI Agent
      - key: APP_VERSION
        value: 1.0.0
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: RATE_LIMIT_PER_MINUTE
        value: 10
      - key: DAILY_BUDGET_USD
        value: 10.0
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: AGENT_API_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: health-care-redis
          property: connectionString

  - type: redis
    name: health-care-redis
    plan: free
    ipAllowList: []
